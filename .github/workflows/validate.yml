name: validate

on:
  push:
    branches: [main]
    paths:
      - 'data/compounds/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - '.github/workflows/validate.yml'
  pull_request:
    paths:
      - 'data/compounds/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - '.github/workflows/validate.yml'

jobs:
  validate-smiles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install rdkit pandas requests tqdm

      - name: Rebuild compound library from PubChem
        run: python scripts/build_compound_library.py

      - name: Validate every SMILES
        run: python scripts/validate_smiles.py

      - name: Confirm CSV did not drift
        run: |
          # Allow drift (PubChem updates) but require non-empty + RDKit-parseable.
          python -c "import pandas as pd, sys; df = pd.read_csv('data/compounds/MCAS_Compound_Library_v1.csv'); assert len(df) >= 40, 'library shrank unexpectedly'; print(f'OK: {len(df)} rows')"
