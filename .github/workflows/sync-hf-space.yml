name: Sync Hugging Face Space

# Re-deploy the OpenMCAS Streamlit viewer (MRDula/openmcas-browser) whenever
# anything the Space depends on changes on main, after the validate workflow
# passes, or on manual trigger from the Actions tab.
#
# REQUIRED REPO SECRET:
#   HF_TOKEN — Hugging Face token with WRITE scope on
#              huggingface.co/spaces/MRDula/openmcas-browser.
#              Set at: Settings → Secrets and variables → Actions → New secret.
#
# OPTIONAL VARS (override defaults in scripts/sync_hf_space.py):
#   HF_USER, HF_SPACE — if you fork to a different namespace.

on:
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'requirements-app.txt'
      - 'huggingface-space/SPACE_README.md'
      - 'scripts/sync_hf_space.py'
      - 'data/**'
      - 'outputs/**'
      - '.github/workflows/sync-hf-space.yml'
  schedule:
    # Sunday 03:17 UTC — keeps the Space warm and re-syncs in case of drift.
    # Offset minute to avoid the top-of-hour traffic spike on Actions runners.
    - cron: "17 3 * * 0"
  workflow_dispatch:
    inputs:
      wait_for_running:
        description: "Poll Space runtime until RUNNING"
        required: false
        type: boolean
        default: true
      repo_id:
        description: "Override Space repo id (default MRDula/openmcas-browser)"
        required: false
        type: string

concurrency:
  group: sync-hf-space
  cancel-in-progress: false   # finish any in-flight sync before starting a new one

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_USER: ${{ vars.HF_USER || 'MRDula' }}
      HF_SPACE: ${{ vars.HF_SPACE || 'openmcas-browser' }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify token is configured
        run: |
          if [ -z "${HF_TOKEN}" ]; then
            echo "::error::HF_TOKEN secret is not set."
            echo "::error::Add a write-scoped Hugging Face token at:"
            echo "::error::Settings → Secrets and variables → Actions → New repository secret"
            echo "::error::Name: HF_TOKEN  ·  Value: hf_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
            exit 1
          fi
          echo "HF_TOKEN is configured."

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install 'huggingface_hub>=1.0,<2.0'

      - name: Resolve sync target
        id: target
        run: |
          if [ -n "${{ github.event.inputs.repo_id }}" ]; then
            echo "repo_id=${{ github.event.inputs.repo_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "repo_id=${HF_USER}/${HF_SPACE}" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync to Hugging Face Space
        run: |
          WAIT_FLAG=""
          if [ "${{ github.event.inputs.wait_for_running }}" = "true" ] || [ -z "${{ github.event.inputs.wait_for_running }}" ]; then
            WAIT_FLAG="--wait"
          fi
          python scripts/sync_hf_space.py \
            --repo-id "${{ steps.target.outputs.repo_id }}" \
            --commit-message "Sync from MCAS.Opensource@${GITHUB_SHA::7}" \
            $WAIT_FLAG

      - name: Summary
        if: always()
        run: |
          REPO_ID="${{ steps.target.outputs.repo_id }}"
          {
            echo "## Hugging Face Space sync"
            echo ""
            echo "**Target:** \`${REPO_ID}\`"
            echo ""
            echo "**Source commit:** \`${GITHUB_SHA::7}\` ([view](https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}))"
            echo ""
            echo "**Live URL:** https://huggingface.co/spaces/${REPO_ID}"
          } >> "$GITHUB_STEP_SUMMARY"
